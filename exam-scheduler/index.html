<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="資格試験スケジュール管理アプリ - 年間カレンダーで一元管理">
    <title>資格試験 スケジュール管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- ヘッダー -->
        <header class="header">
            <h1>
                <a href="#" onclick="location.reload(); return false;" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:0.8rem;">
                    <i class="fas fa-calendar-check"></i> パッとわかる！受験スケジュールシート
                </a>
            </h1>
            <div class="header-actions">
                <button class="btn btn-secondary" id="btn-settings" title="データ管理"><i class="fas fa-cog"></i> <span class="action-text">設定</span></button>
                <button class="btn btn-primary" id="btn-add-exam"><i class="fas fa-plus"></i> <span class="action-text">新規追加</span></button>
            </div>
        </header>

        <section id="next-exam-pop" class="next-exam-pop hidden"></section>

        <main id="schedule-view">
            <!-- ミニカレンダー -->
            <section class="mini-calendar-section">
                <div style="display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap;">
                    <div class="calendar-heading-row">
                        <h2 class="section-heading" style="margin-bottom: 0;"><i class="far fa-calendar-alt"></i> 年間カレンダー</h2>
                        <button class="section-tool-btn" id="view-results-btn" type="button"><i class="fas fa-chart-line"></i> 試験結果</button>
                    </div>
                    <!-- 年度切り替えUI -->
                    <div class="fiscal-year-nav">
                        <button id="prev-year" aria-label="前の年度"><i class="fas fa-chevron-left"></i></button>
                        <span id="current-fiscal-year">2026年度 (26年4月 - 27年3月)</span>
                        <button id="next-year" aria-label="次の年度"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
                <div id="mini-calendar" class="mini-calendar-grid"></div>
            </section>



            <!-- 登録済み試験リスト -->
            <section>
                <h2 class="section-heading"><i class="fas fa-bookmark"></i> 登録済み試験</h2>
                <div id="exam-list" class="exam-list"></div>
            </section>
        </main>

        <main id="results-view" class="hidden">
            <section class="results-section">
                <div class="results-heading-row">
                    <h2 class="section-heading"><i class="fas fa-chart-line"></i> 試験結果</h2>
                    <button class="section-tool-btn" id="view-schedule-btn" type="button"><i class="far fa-calendar-alt"></i> カレンダー</button>
                </div>
                <div id="results-dashboard"></div>
            </section>
        </main>
    </div>

    <!-- 試験登録・編集モーダル -->
    <div id="exam-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">資格試験を追加</h2>
                <button class="btn-close" id="btn-close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="exam-form">
                    <input type="hidden" id="exam-id">
                    <input type="hidden" id="edit-date-idx">

                    <div class="form-group smart-entry-group">
                        <label for="smart-schedule-input">文章から自動入力</label>
                        <textarea id="smart-schedule-input" rows="3" placeholder="例: FP2級を2026年9月13日に受験。申込は7月1日から8月1日まで。10時開始。"></textarea>
                        <button type="button" id="btn-parse-schedule" class="btn btn-secondary smart-entry-btn">
                            <i class="fas fa-wand-magic-sparkles"></i> 読み取り
                        </button>
                    </div>
                    
                    <div class="form-group">
                        <label for="exam-name">資格試験名 <span class="required">*</span></label>
                        <input type="text" id="exam-name" required placeholder="例: TOEIC L&R, ITパスポート">
                        <div id="recent-exams-container" style="margin-top: 0.6rem; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;"></div>
                    </div>

                    <div class="form-group">
                        <label for="result-type">結果の記録方法</label>
                        <div class="result-type-switch" id="result-type-switch">
                            <input type="hidden" id="result-type" value="passfail">
                            <button type="button" class="result-type-option active" data-result-type="passfail">合否</button>
                            <button type="button" class="result-type-option" data-result-type="score">スコア</button>
                        </div>
                    </div>

                    <div id="exam-dates-container" class="exam-dates-container">
                        <!-- 日程行が動的に追加される -->
                    </div>
                    <button type="button" id="btn-add-date-row" class="btn btn-secondary" style="width: 100%; margin-bottom: 1rem;">
                        <i class="fas fa-plus"></i> 別の日程を追加
                    </button>
                    <button type="button" id="btn-delete-date" class="btn btn-secondary" style="width: 100%; margin-bottom: 1rem; color: var(--danger-color); border-color: var(--danger-color); display: none;">
                        <i class="fas fa-trash"></i> この日程を削除
                    </button>

                    <div class="form-actions">
                        <button type="button" id="btn-cancel" class="btn btn-secondary">キャンセル</button>
                        <button type="submit" class="btn btn-primary">保存する</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 420px;">
            <div class="modal-header">
                <h2><i class="fas fa-cog"></i> データ管理・設定</h2>
                <button class="btn-close btn-close-large" id="btn-close-settings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <h3 class="setting-title"><i class="fas fa-cloud"></i> クラウド連携 (同期)</h3>
                    <div id="auth-unlogged">
                        <p class="setting-desc">Googleアカウントでログインすると、データをクラウドに保存し、複数の端末で同期できます。</p>
                        <button id="btn-login-google" class="btn btn-primary" style="width:100%;"><i class="fab fa-google"></i> Googleでログイン</button>
                    </div>
                    <div id="auth-logged" class="hidden">
                        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                            <img id="user-avatar" src="" alt="User" class="user-avatar" style="width:48px; height:48px;">
                            <div style="flex: 1; text-align: left; overflow: hidden;">
                                <div style="font-weight: 700; font-size: 0.95rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="user-name">ユーザー</div>
                                <div style="font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="user-email">email@example.com</div>
                            </div>
                        </div>
                        <button id="btn-logout" class="btn btn-secondary" style="width:100%;"><i class="fas fa-sign-out-alt"></i> ログアウト</button>
                    </div>
                </div>
                <div class="setting-group">
                    <h3 class="setting-title"><i class="fas fa-bell"></i> プッシュ通知</h3>
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <p class="setting-desc" style="margin-bottom: 0;">試験が近づいた際に通知でお知らせします。</p>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-notifications">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="setting-group">
                    <h3 class="setting-title"><i class="fas fa-moon"></i> ダークモード</h3>
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <p class="setting-desc" style="margin-bottom: 0;">画面に目に優しい暗色テーマを適用します。</p>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-darkmode">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

            </div>
        </div>
    </div>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <!-- Flatpickr -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>

    <!-- Highcharts -->
    <script src="https://cdn.jsdelivr.net/npm/highcharts/highcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts/modules/broken-axis.js"></script>

    <script src="app.js"></script>
    <script src="script.js"></script>
</body>
</html>
